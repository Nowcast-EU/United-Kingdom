<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Supplementary Vote Calculator</title>

<style>

@media (min-width: 768px) {
  html { font-size: 80%; }
}

body {
  font-family: Inter, system-ui, sans-serif;
  background: #fff;
  color: #0f172a;
  margin: 0;
  padding: 0 64px 40px 64px;
  scrollbar-gutter: stable;
  overflow-x: hidden;
}

@media (max-width: 768px) {
  body { padding: 0 8px 24px 8px; }
}

h1, h2.subtitle {
  display: block;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
  max-width: 100%;
}

h1 {
  font-weight: 600;
  font-size: clamp(1.2rem, 4vw, 2rem);
  line-height: 1.25;
  margin-top: 24px;
  margin-bottom: 4px;
}

h2.subtitle {
  font-weight: 400;
  color: #555;
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  margin-top: 0;
  margin-bottom: 16px;
}

/* ── Page layout: 25% table / 75% sliders on desktop ── */
.page-layout {
  display: grid;
  grid-template-columns: 1fr 3fr;
  gap: 24px;
  align-items: stretch;   /* both columns stretch to the same height */
  margin-top: 4px;
}

@media (max-width: 768px) {
  .page-layout { grid-template-columns: 1fr; gap: 16px; }
}

/* Left column: flex column so button stays at bottom */
.left-col {
  display: flex;
  flex-direction: column;
}

/* ── Section headings ── */
.section-label {
  font-size: 0.78rem;
  font-weight: 650;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #64748b;
  margin-bottom: 4px;
}

/* ── Tables ── */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0;
  table-layout: fixed;
}

th, td {
  padding: 4px 6px;
  border: 1px solid #e2e8f0;
  text-align: left;
  word-wrap: break-word;
}

th {
  background: #f1f5f9;
  font-weight: 650;
  height: 28px;
  text-align: center;
  vertical-align: middle;
}

td {
  height: 30px;
  vertical-align: middle;
}

/* Party name cell — colour strip on the RIGHT edge */
td.party-column {
  font-weight: bold;
  position: relative;
  padding-right: 12px;   /* room for the strip on the right */
  padding-left: 6px;
  color: black;
}
td.party-column::after {
  content: "";
  position: absolute;
  right: 0; top: 0;
  width: 6px; height: 100%;
  border-radius: 0 2px 2px 0;
  background-color: var(--party-color);
}

/* Input cell — centred */
td.input-cell {
  text-align: center;
}

.input-wrapper {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.input-wrapper input {
  width: 48px;
  padding: 3px 4px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  text-align: right;
  font-size: inherit;
  font-family: inherit;
  transition: border-color 0.2s;
}
.input-wrapper input:focus { outline: none; border-color: #3b82f6; }
.input-wrapper input.auto {
  background: #f1f5f9;
  color: #94a3b8;
  cursor: default;
}
.percent-sign { font-size: 0.85em; color: #64748b; }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

td.result-column {
  font-weight: bold;
  text-align: center;
}
td.result-column.winner { color: #008500; }

tfoot td {
  font-weight: bold;
  text-align: center;
  background: #f1f5f9;
  height: 14px;
  vertical-align: middle;
}
tfoot td:first-child { text-align: left; padding-left: 6px; }

.total-ok { color: #008500; font-weight: bold; }
.total-err { color: #bb0000; font-weight: bold; }

/* ── Reset button — pushed to bottom of left col ── */
.button-container {
  margin-top: auto;
  padding-top: 14px;
}

button#reset {
  background: #008500;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  font-weight: 600;
  width: 100%;
  transition: background 0.2s;
}
button#reset:hover { background: #005f00; }

/* ── Sliders panel — fills height to match table col ── */
.sliders-panel {
  display: flex;
  flex-direction: column;
}

/* Tabs */
.tab-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.tab-btn {
  font-size: 0.78rem;
  font-weight: 650;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid #cbd5e1;
  background: transparent;
  color: #64748b;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.tab-btn:hover:not(.active) { background: #f1f5f9; }
.tab-btn.active { color: #fff; border-color: transparent; }
.tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Slider list stretches to fill remaining space */
.slider-list {
  display: flex;
  flex-direction: column;
  flex: 1;
  /* distribute rows evenly so they stretch to fill height */
  justify-content: space-between;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid #f1f5f9;
  flex: 1;                /* each row grows equally */
}
.slider-row:last-of-type { border-bottom: none; }

.sl-lbl {
  font-size: 0.82rem;
  color: #334155;
  display: flex;
  align-items: center;
  gap: 5px;
  width: 120px;
  flex-shrink: 0;
  font-weight: 500;
}
.sl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Range slider with per-row accent colour via CSS var */
input[type="range"] {
  flex: 1;
  height: 4px;
  accent-color: var(--sl-color, #3b82f6);
  cursor: pointer;
  min-width: 0;
}
input[type="range"]:disabled {
  opacity: 0.35;
  cursor: default;
}

.sl-val {
  font-size: 0.82rem;
  font-weight: 650;
  font-variant-numeric: tabular-nums;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
  color: #0f172a;
}
.sl-val.auto { color: #94a3b8; font-weight: 400; font-style: italic; }

.slider-total {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0 0;
  margin-top: 4px;
  border-top: 1px solid #e2e8f0;
  font-size: 0.82rem;
  color: #64748b;
  font-weight: 600;
  flex-shrink: 0;
}
.slider-total .tot-val { font-variant-numeric: tabular-nums; }

@media (max-width: 768px) {
  table, th, td { font-size: 13px; }
  .input-wrapper input { width: 42px; }
  .slider-list { justify-content: flex-start; gap: 2px; }
  .slider-row { flex: none; }
}

@media (max-width: 480px) {
  table, th, td { font-size: 12px; }
  .input-wrapper input { width: 38px; }
}

</style>
</head>
<body>

<h1>Supplementary Vote Calculator</h1>
<h2 class="subtitle">Enter first preference vote shares and adjust second preference transfer rates to project a result.</h2>

<div class="page-layout">

  <!-- LEFT 25%: Results table -->
  <div class="left-col">
    <div class="section-label">Results</div>
    <table>
      <thead>
        <tr>
          <th style="text-align:left">Party</th>
          <th>1st %</th>
          <th>2nd rd</th>
          <th>% rd</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td id="fp-total">100.0%</td>
          <td></td>
          <td></td>
        </tr>
      </tfoot>
    </table>

    <div class="button-container">
      <button id="reset" onclick="resetAll()">↺ Reset to defaults</button>
    </div>
  </div>

  <!-- RIGHT 75%: Sliders -->
  <div class="sliders-panel">
    <div class="section-label">2nd preference transfers from…</div>
    <div class="tab-row" id="tab-bar"></div>
    <div class="slider-list" id="slider-area"></div>
    <div class="slider-total">
      <span>Total</span>
      <span class="tot-val" id="sl-total">100%</span>
    </div>
  </div>

</div>

<script>
const PARTIES = [
  { id: 'RFM', name: 'Reform',        color: '#12B6CF' },
  { id: 'LAB', name: 'Labour',        color: '#CC2222' },
  { id: 'GRN', name: 'Green',         color: '#02A95B' },
  { id: 'CON', name: 'Conservative',  color: '#0087DC' },
  { id: 'LDM', name: 'Lib Dem',       color: '#FAA61A' },
  { id: 'WPB', name: 'Workers',       color: '#8B0000' },
  { id: 'RES', name: 'Residents',     color: '#555555' },
  { id: 'OTH', name: 'Other',         color: '#888888', auto: true },
];

const DEFAULT_FP = { RFM: 30.7, LAB: 23.6, GRN: 19.1, CON: 10.3, LDM: 9.5, WPB: 1.4, RES: 0.0 };

function makeDefaultTransfers() {
  const t = {};
  PARTIES.forEach(f => {
    t[f.id] = {};
    PARTIES.forEach(to => { if (to.id !== f.id) t[f.id][to.id] = 0; });
    t[f.id]['NON'] = 100;
  });
  t['RFM']['CON'] = 67; t['RFM']['NON'] = 33;
  t['LAB']['GRN'] = 67; t['LAB']['NON'] = 33;
  t['GRN']['LAB'] = 67; t['GRN']['NON'] = 33;
  t['CON']['RFM'] = 67; t['CON']['NON'] = 33;
  t['LDM']['LAB'] = 35; t['LDM']['GRN'] = 35; t['LDM']['NON'] = 30;
  t['WPB']['NON'] = 100;
  t['RES']['NON'] = 100;
  t['OTH']['NON'] = 100;
  return t;
}

let fpVotes = { ...DEFAULT_FP };
let transfers = makeDefaultTransfers();
let activeTab = 'RFM';

// ── Helpers ────────────────────────────────────────────────────────────────

function getOth() {
  return Math.max(0, 100 - PARTIES.filter(p => !p.auto)
    .reduce((a, p) => a + (fpVotes[p.id] || 0), 0));
}

function allFP() {
  return { ...fpVotes, OTH: getOth() };
}

function getTop2() {
  const fp = allFP();
  return Object.entries(fp).sort((a, b) => b[1] - a[1]).slice(0, 2).map(e => e[0]);
}

function computeRound2() {
  const fp = allFP();
  const [c1, c2] = getTop2();
  let v1 = fp[c1], v2 = fp[c2];
  PARTIES.forEach(from => {
    if (from.id === c1 || from.id === c2) return;
    const sh = (fp[from.id] || 0) / 100;
    const tr = transfers[from.id] || {};
    v1 += (tr[c1] || 0) / 100 * sh * 100;
    v2 += (tr[c2] || 0) / 100 * sh * 100;
  });
  return { c1, c2, v1, v2 };
}

function recalcNon(fromId) {
  const manual = PARTIES.filter(p => p.id !== fromId)
    .reduce((a, p) => a + (transfers[fromId][p.id] || 0), 0);
  transfers[fromId]['NON'] = Math.max(0, 100 - manual);
}

// How much headroom is left for the activeTab (excluding NON which is auto)
function headroom() {
  const manual = PARTIES.filter(p => p.id !== activeTab)
    .reduce((a, p) => a + (transfers[activeTab][p.id] || 0), 0);
  return Math.max(0, 100 - manual);
}

// ── Render: Results table ─────────────────────────────────────────────────

function renderResults() {
  const fp = allFP();
  const { c1, c2, v1, v2 } = computeRound2();
  const tot = v1 + v2;
  const body = document.getElementById('results-body');

  const focused = document.activeElement && document.activeElement.dataset.partyId;
  body.innerHTML = '';

  PARTIES.forEach(p => {
    const isTop = p.id === c1 || p.id === c2;
    const r2val = p.id === c1 ? v1 : p.id === c2 ? v2 : null;
    const pct = r2val !== null ? (r2val / tot * 100) : null;
    const winner = r2val !== null && r2val === Math.max(v1, v2);
    const fpVal = fp[p.id] || 0;

    const tr = document.createElement('tr');

    // Party name — colour strip on right
    const partyTd = document.createElement('td');
    partyTd.className = 'party-column';
    partyTd.style.setProperty('--party-color', p.color);
    partyTd.textContent = p.id;
    tr.appendChild(partyTd);

    // 1st pref input — centred
    const fpTd = document.createElement('td');
    fpTd.className = 'input-cell';
    const wrapper = document.createElement('div');
    wrapper.className = 'input-wrapper';
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.min = 0; inp.max = 100; inp.step = 0.1;
    inp.value = fpVal.toFixed(1);
    inp.dataset.partyId = p.id;
    if (p.auto) {
      inp.className = 'auto';
      inp.readOnly = true;
    } else {
      inp.addEventListener('change', e => {
        let v = parseFloat(e.target.value);
        if (isNaN(v)) v = 0;
        fpVotes[p.id] = Math.max(0, Math.min(100, v));
        updateAll();
      });
    }
    const pctSign = document.createElement('span');
    pctSign.className = 'percent-sign';
    pctSign.textContent = '%';
    wrapper.appendChild(inp);
    wrapper.appendChild(pctSign);
    fpTd.appendChild(wrapper);
    tr.appendChild(fpTd);

    // 2nd round value
    const r2Td = document.createElement('td');
    r2Td.className = 'result-column';
    r2Td.textContent = isTop ? r2val.toFixed(1) + '%' : '—';
    tr.appendChild(r2Td);

    // % of round
    const pctTd = document.createElement('td');
    pctTd.className = 'result-column' + (winner ? ' winner' : '');
    pctTd.textContent = isTop ? pct.toFixed(1) + '%' : '—';
    tr.appendChild(pctTd);

    body.appendChild(tr);
  });

  const totalVal = Object.values(fp).reduce((a, b) => a + b, 0);
  const totEl = document.getElementById('fp-total');
  totEl.textContent = totalVal.toFixed(1) + '%';
  totEl.className = Math.abs(totalVal - 100) < 0.15 ? 'total-ok' : 'total-err';

  if (focused) {
    const el = body.querySelector(`input[data-party-id="${focused}"]`);
    if (el) { el.focus(); el.select(); }
  }
}

// ── Render: Tabs + sliders ────────────────────────────────────────────────

function renderSliders() {
  // Tabs
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = '';
  PARTIES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (p.id === activeTab ? ' active' : '');
    if (p.id === activeTab) btn.style.background = p.color;
    const dotColor = p.id === activeTab ? 'rgba(255,255,255,0.65)' : p.color;
    btn.innerHTML = `<span class="tab-dot" style="background:${dotColor}"></span>${p.id}`;
    btn.addEventListener('click', () => { activeTab = p.id; renderSliders(); });
    tabBar.appendChild(btn);
  });

  // Slider rows
  const area = document.getElementById('slider-area');
  area.innerHTML = '';

  const toList = [
    ...PARTIES.filter(p => p.id !== activeTab),
    { id: 'NON', name: 'Non-vote (2nd)', color: '#c0392b' }
  ];

  toList.forEach(to => {
    const isNon = to.id === 'NON';
    const v = isNon
      ? (transfers[activeTab]['NON'] || 0)
      : (transfers[activeTab][to.id] || 0);

    const row = document.createElement('div');
    row.className = 'slider-row';
    row.dataset.toId = to.id;

    const lbl = document.createElement('div');
    lbl.className = 'sl-lbl';
    lbl.innerHTML = `<span class="sl-dot" style="background:${to.color}"></span>${isNon ? 'Non-vote (2nd)' : to.name}`;

    const sl = document.createElement('input');
    sl.type = 'range'; sl.min = 0; sl.max = 100; sl.step = 1;
    sl.value = v;
    // accent-color via CSS custom property on the element
    sl.style.setProperty('--sl-color', to.color);

    if (isNon) {
      sl.disabled = true;
    } else {
      sl.addEventListener('input', () => {
        const desired = parseInt(sl.value);
        // How much room do all OTHER manual sliders leave?
        const othersTotal = PARTIES.filter(p => p.id !== activeTab && p.id !== to.id)
          .reduce((a, p) => a + (transfers[activeTab][p.id] || 0), 0);
        const maxAllowed = Math.max(0, 100 - othersTotal);
        const clamped = Math.min(desired, maxAllowed);
        // Snap the slider back if it was clamped
        if (clamped !== desired) sl.value = clamped;
        transfers[activeTab][to.id] = clamped;
        recalcNon(activeTab);
        updateSliderDisplay();
        renderResults();
      });
    }

    const valSpan = document.createElement('span');
    valSpan.className = 'sl-val' + (isNon ? ' auto' : '');
    valSpan.dataset.key = to.id;
    valSpan.textContent = v + '%';

    row.appendChild(lbl);
    row.appendChild(sl);
    row.appendChild(valSpan);
    area.appendChild(row);
  });

  updateSliderDisplay();
}

function updateSliderDisplay() {
  const rows = document.querySelectorAll('#slider-area .slider-row');
  let total = 0;
  rows.forEach(row => {
    const toId = row.dataset.toId;
    const v = toId === 'NON'
      ? (transfers[activeTab]['NON'] || 0)
      : (transfers[activeTab][toId] || 0);
    total += v;
    const sl = row.querySelector('input[type=range]');
    const valEl = row.querySelector('.sl-val');
    if (sl && toId === 'NON') sl.value = v; // keep NON slider in sync
    if (valEl) valEl.textContent = v + '%';

    // Dynamically cap each non-NON slider's max to prevent going over 100
    if (sl && toId !== 'NON') {
      const othersTotal = PARTIES.filter(p => p.id !== activeTab && p.id !== toId)
        .reduce((a, p) => a + (transfers[activeTab][p.id] || 0), 0);
      const maxAllowed = Math.max(0, 100 - othersTotal);
      sl.max = maxAllowed;
    }
  });
  const totEl = document.getElementById('sl-total');
  if (totEl) {
    totEl.textContent = total + '%';
    totEl.style.color = Math.abs(total - 100) < 1 ? '#008500' : '#bb0000';
  }
}

function updateAll() {
  renderResults();
  updateSliderDisplay();
}

function resetAll() {
  fpVotes = { ...DEFAULT_FP };
  transfers = makeDefaultTransfers();
  activeTab = 'RFM';
  renderSliders();
  updateAll();
}

// ── Init ──────────────────────────────────────────────────────────────────
renderSliders();
updateAll();
</script>
</body>
</html>
