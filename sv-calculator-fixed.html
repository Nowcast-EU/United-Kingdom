<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Supplementary Vote Calculator</title>

<style>

  #sv-calculator-wrap {
  all: revert;
  font-family: Inter, system-ui, sans-serif;
  color: #0f172a;
}

@media (min-width: 768px) {
  html { font-size: 80%; }
}

body {
  font-family: Inter, system-ui, sans-serif;
  background: #fff;
  color: #0f172a;
  margin: 0;
  padding: 0 0 40px;
  scrollbar-gutter: stable;
  overflow-x: hidden;
  min-height: 600px;
}

.page-wrapper {
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}

@media (max-width: 768px) {
  body { padding: 0 8px 24px 8px; }

}

h1 {
  margin: 0;
  text-align: left;
  font-weight: 600;
  font-size: clamp(1.2rem, 4vw, 2rem);
  line-height: 1.25;
}

.header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-top: 8px;
  margin-bottom: 2px;
}

.mobile-logo { display: none; }

@media (max-width: 768px) {
  .desktop-logo { display: none; }
  .mobile-logo { display: block; }
}

.header-logo {
  height: 32px;
  width: auto;
  object-fit: contain;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 2px;
}

  @media (max-width: 768px) {
.header-logo {
  height: 38px;
}
}

h2.subtitle {
  font-size: 1.2rem;
  font-weight: 400;
  color: #999999;
  margin: 10px 0 0 0;
  text-align: left;
  font-style: italic;
}

.page-layout {
  display: grid;
  grid-template-columns: 1.5fr 3fr;
  gap: 24px;
  align-items: stretch;
  margin-top: 0;
}

@media (max-width: 768px) {
  .page-layout { grid-template-columns: 1fr; gap: 16px; }
}

.left-col {
  display: flex;
  flex-direction: column;
}

.section-label {
  font-size: 0.78rem;
  font-weight: 650;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #da085c;
  margin-bottom: 4px;
}

#sv-calculator-wrap table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0;
  table-layout: fixed;
}

#sv-calculator-wrap th, #sv-calculator-wrap td {
  padding: 4px 6px;
  border: 1px solid #e2e8f0;
  text-align: left;
  word-wrap: break-word;
}

#sv-calculator-wrap th {
  background: #f1f5f9;
  font-weight: 650;
  height: 28px;
  text-align: center;
  vertical-align: middle;
}

#sv-calculator-wrap td {
  height: 30px;
  vertical-align: middle;
}

td.party-column {
  font-weight: bold;
  position: relative;
  padding-right: 10px;
  padding-left: 10px;
  color: black;
  letter-spacing: 0.05em;
}
td.party-column::after {
  content: "";
  position: absolute;
  right: 0; top: 0;
  width: 6px; height: 100%;
  border-radius: 0;
  background-color: var(--party-color);
}

td.input-cell {
  text-align: center;
}

.input-wrapper {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
#sv-calculator-wrap .input-wrapper input {
  width: 75%;
  padding: 3px 4px;
  border: 1px solid #cbd5e1;
  border-radius: 4px;
  text-align: right;
  font-size: inherit;
  font-family: inherit;
  transition: border-color 0.2s;
}
#sv-calculator-wrap .input-wrapper input:focus { outline: none; border-color: #3b82f6; }
#sv-calculator-wrap .input-wrapper input.auto {
  background: #f1f5f9;
  color: #94a3b8;
  cursor: default;
}
.percent-sign { font-size: 0.85em; color: #64748b; }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

td.result-column {
  font-weight: bold;
  text-align: center;
}
td.result-column.winner { color: #008500; }

#sv-calculator-wrap tfoot td {
  font-weight: bold;
  text-align: center;
  background: #f1f5f9;
  height: 14px;
  vertical-align: middle;
}
#sv-calculator-wrap tfoot td:first-child { text-align: left; padding-left: 6px; }

.total-ok { color: #008500; font-weight: bold; }
.total-err { color: #bb0000; font-weight: bold; }

.button-container {
  margin-top: auto;
  padding-top: 14px;
}

#sv-calculator-wrap button#reset {
  background: #da085c;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  font-weight: 600;
  width: 100%;
  transition: background 0.2s;
}
#sv-calculator-wrap button#reset:hover { background: #da085c; }

.sliders-panel {
  display: flex;
  flex-direction: column;
}

.tab-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.tab-btn {
  font-size: 0.78rem;
  font-weight: 650;
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid #cbd5e1;
  background: transparent;
  color: #64748b;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.tab-btn:hover:not(.active) { background: #f1f5f9; }
.tab-btn.active { color: #fff; border-color: transparent; }
.tab-dot { width: 8px; height: 8px; min-width: 8px; min-height: 8px; border-radius: 50%; flex-shrink: 0; }

.slider-list {
  display: flex;
  flex-direction: column;
  flex: 1;

  justify-content: space-between;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid #f1f5f9;
  flex: 1;               
}
.slider-row:last-of-type { border-bottom: none; }

.sl-lbl {
  font-size: 0.92rem;
  color: #0f172a;
  display: flex;
  align-items: center;
  gap: 5px;
  width: 120px;
  flex-shrink: 0;
  font-weight: 700;
}
.sl-dot { width: 5px; height: 22px; border-radius: 2px; flex-shrink: 0; }

@media (min-width: 769px) {
  .tab-btn {
    font-size: 0.92rem;
    padding: 5px 14px;
  }
  .sl-lbl {
    font-size: 0.96rem;
    width: 140px;
  }
  .slider-row {
    padding: 2px 0;
    min-height: 34px;
    flex: none;
  }
  .slider-list {
    gap: 0;
    justify-content: flex-start;
  }
}

input[type="range"] {
  flex: 1;
  min-width: 0;
  cursor: default;

  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  height: 20px;      
  padding: 0;
  margin: 0;
}

input[type="range"]::-webkit-slider-runnable-track {
  height: 4px;
  border-radius: 2px;
  background: var(--track-bg, #d1d5db);
  cursor: default;
}

input[type="range"]::-moz-range-track {
  height: 4px;
  border-radius: 2px;
  background: var(--track-bg, #d1d5db);
  border: none;
  cursor: default;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--sl-color, #3b82f6);
  margin-top: -5px; 
  cursor: pointer;
  border: none;
}

input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--sl-color, #3b82f6);
  cursor: pointer;
  border: none;
}
input[type="range"]:disabled {
  opacity: 0.45;
  cursor: default;
}
input[type="range"]:disabled::-webkit-slider-thumb { cursor: default; }
input[type="range"]:disabled::-moz-range-thumb    { cursor: default; }

.sl-val {
  font-size: 0.82rem;
  font-weight: 650;
  font-variant-numeric: tabular-nums;
  width: 36px;
  text-align: right;
  flex-shrink: 0;
  color: #0f172a;
}
.sl-val.auto { color: #94a3b8; font-weight: 400; font-style: italic; }


@media (max-width: 768px) {

  .party-head {
  width: 40px;
}
  
  table, th, td { font-size: 13px; }
  .input-wrapper input { width: 42px; }

   th {
    height: 22px;
    padding: 2px 6px;
  }

  td {
    height: 24px;
    padding: 2px 6px;
  }
  
  .slider-list { justify-content: flex-start; gap: 2px; }
  .slider-row { flex: none; }
      h2.subtitle { font-size: 0.8rem; }
  .header-row { margin-bottom: -8px; }
}

@media (max-width: 480px) {
  table, th, td { font-size: 12px; }
  .input-wrapper input { width: 38px; }
}

</style>
</head>
<body>
  
<div id="sv-calculator-wrap">
  <div class="page-wrapper">

<div class="header-row">
  <h1>Supplementary Vote Calculator</h1>
<img src="https://raw.githubusercontent.com/Nowcast-EU/United-Kingdom/refs/heads/main/TheMillLogo.png" alt="Logo" class="header-logo desktop-logo" />
<img src="https://raw.githubusercontent.com/Nowcast-EU/United-Kingdom/refs/heads/main/TheMillLogo_Mobile.png" alt="Logo" class="header-logo mobile-logo" />
</div>

<div class="page-layout">

  <div class="left-col">
    <div class="section-label">Results (user generated)</div>
    <table>
   <thead>
  <tr>
    <th class="party-head" style="width:22%">Party</th>
    <th style="width:26%">1st round</th>
    <th style="width:26%">2nd round</th>
    <th style="width:26%">% of round</th>
  </tr>
</thead>
      <tbody id="results-body"></tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td id="fp-total">100.0%</td>
          <td></td>
          <td></td>
        </tr>
      </tfoot>
    </table>

    <div class="button-container">
      <button id="reset" onclick="resetAll()">↺ Reset to defaults</button>
    </div>
  </div>

  <div class="sliders-panel">
    <div class="section-label">2nd preference transfers from…</div>
    <div class="tab-row" id="tab-bar"></div>
    <div class="slider-list" id="slider-area"></div>
    <h2 class="subtitle">Enter first preference vote shares and adjust second preference transfer rates to project a result.</h2>
  </div>

</div>

<script>
const PARTIES = [
  { id: 'RFM', name: 'Reform',        color: '#34D8EF' },
  { id: 'LAB', name: 'Labour',        color: '#E4003B' },
  { id: 'GRN', name: 'Green',         color: '#6AB023' },
  { id: 'CON', name: 'Conservative',  color: '#0087DC' },
  { id: 'LDM', name: 'Lib Dem',       color: '#FAA61A' },
  { id: 'WPB', name: 'Workers',       color: '#990000' },
  { id: 'RES', name: 'Restore',     color: '#000000' },
  { id: 'OTH', name: 'Ind/Oth',         color: '#999999', auto: true },
];

const DEFAULT_FP = { RFM: 30.7, LAB: 23.6, GRN: 19.1, CON: 10.3, LDM: 9.5, WPB: 1.4, RES: 0.0 };

function makeDefaultTransfers() {
  const t = {};
  PARTIES.forEach(f => {
    t[f.id] = {};
    PARTIES.forEach(to => { if (to.id !== f.id) t[f.id][to.id] = 0; });
    t[f.id]['NON'] = 100;
  });
  t['RFM']['LAB'] = 2;  t['RFM']['GRN'] = 1;  t['RFM']['CON'] = 50; t['RFM']['LDM'] = 2;  t['RFM']['WPB'] = 3;  t['RFM']['RES'] = 20; t['RFM']['OTH'] = 0;  t['RFM']['NON'] = 22;
  t['LAB']['RFM'] = 2;  t['LAB']['GRN'] = 45; t['LAB']['CON'] = 5;  t['LAB']['LDM'] = 30; t['LAB']['WPB'] = 5;  t['LAB']['RES'] = 0;  t['LAB']['OTH'] = 0;  t['LAB']['NON'] = 13;
  t['GRN']['RFM'] = 1;  t['GRN']['LAB'] = 55; t['GRN']['CON'] = 2;  t['GRN']['LDM'] = 15; t['GRN']['WPB'] = 10; t['GRN']['RES'] = 0;  t['GRN']['OTH'] = 0;  t['GRN']['NON'] = 17;
  t['CON']['RFM'] = 50; t['CON']['LAB'] = 5;  t['CON']['GRN'] = 2;  t['CON']['LDM'] = 25; t['CON']['WPB'] = 0;  t['CON']['RES'] = 4;  t['CON']['OTH'] = 0;  t['CON']['NON'] = 14;
  t['LDM']['RFM'] = 1;  t['LDM']['LAB'] = 50; t['LDM']['GRN'] = 25; t['LDM']['CON'] = 5;  t['LDM']['WPB'] = 1;  t['LDM']['RES'] = 2;  t['LDM']['OTH'] = 0;  t['LDM']['NON'] = 16;
  t['WPB']['RFM'] = 2;  t['WPB']['LAB'] = 25; t['WPB']['GRN'] = 45; t['WPB']['CON'] = 5;  t['WPB']['LDM'] = 5;  t['WPB']['RES'] = 0;  t['WPB']['OTH'] = 0;  t['WPB']['NON'] = 18;
  t['RES']['RFM'] = 50; t['RES']['LAB'] = 0;  t['RES']['GRN'] = 0;  t['RES']['CON'] = 10; t['RES']['LDM'] = 0;  t['RES']['WPB'] = 0;  t['RES']['OTH'] = 0;  t['RES']['NON'] = 40;
  t['OTH']['RFM'] = 0;  t['OTH']['LAB'] = 0;  t['OTH']['GRN'] = 0;  t['OTH']['CON'] = 0;  t['OTH']['LDM'] = 0;  t['OTH']['WPB'] = 0;  t['OTH']['RES'] = 0;  t['OTH']['NON'] = 100;
  return t;
}

let fpVotes = { ...DEFAULT_FP };
let transfers = makeDefaultTransfers();
let activeTab = 'RFM';

function getOth() {
  return Math.max(0, 100 - PARTIES.filter(p => !p.auto)
    .reduce((a, p) => a + (fpVotes[p.id] || 0), 0));
}

function allFP() {
  return { ...fpVotes, OTH: getOth() };
}

function getTop2() {
  const fp = allFP();
  return Object.entries(fp).sort((a, b) => b[1] - a[1]).slice(0, 2).map(e => e[0]);
}

function computeRound2() {
  const fp = allFP();
  const [c1, c2] = getTop2();
  let v1 = fp[c1], v2 = fp[c2];
  PARTIES.forEach(from => {
    if (from.id === c1 || from.id === c2) return;
    const sh = (fp[from.id] || 0) / 100;
    const tr = transfers[from.id] || {};
    v1 += (tr[c1] || 0) / 100 * sh * 100;
    v2 += (tr[c2] || 0) / 100 * sh * 100;
  });
  return { c1, c2, v1, v2 };
}

function recalcNon(fromId) {
  const manual = PARTIES.filter(p => p.id !== fromId)
    .reduce((a, p) => a + (transfers[fromId][p.id] || 0), 0);
  transfers[fromId]['NON'] =
  Math.round(Math.max(0, 100 - manual) * 10) / 10;
}

function headroom() {
  const manual = PARTIES.filter(p => p.id !== activeTab)
    .reduce((a, p) => a + (transfers[activeTab][p.id] || 0), 0);
  return Math.max(0, 100 - manual);
}

function buildResultsTable() {
  const body = document.getElementById('results-body');
  body.innerHTML = '';

  PARTIES.forEach(p => {
    const tr = document.createElement('tr');

    const partyTd = document.createElement('td');
    partyTd.className = 'party-column';
    partyTd.style.setProperty('--party-color', p.color);
    partyTd.textContent = p.id;
    tr.appendChild(partyTd);

    const fpTd = document.createElement('td');
    fpTd.className = 'input-cell';
    const wrapper = document.createElement('div');
    wrapper.className = 'input-wrapper';
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.min = 0; inp.max = 100; inp.step = 0.1;
    inp.value = (fpVotes[p.id] || 0).toFixed(1);
    inp.dataset.partyId = p.id;
    if (p.auto) {
      inp.className = 'auto';
      inp.readOnly = true;
    }
    const pctSign = document.createElement('span');
    pctSign.className = 'percent-sign';
    pctSign.textContent = '%';
    wrapper.appendChild(inp);
    wrapper.appendChild(pctSign);
    fpTd.appendChild(wrapper);
    tr.appendChild(fpTd);

    const r2Td = document.createElement('td');
    r2Td.className = 'result-column';
    r2Td.dataset.partyResult = p.id;
    tr.appendChild(r2Td);

    const pctTd = document.createElement('td');
    pctTd.className = 'result-column';
    pctTd.dataset.partyPct = p.id;
    tr.appendChild(pctTd);

    body.appendChild(tr);
  });

  attachInputBehaviour();
}

function renderResults() {
  const fp = allFP();
  const totalVal = Object.values(fp).reduce((a, b) => a + b, 0);

  const firstRoundWinner = Object.entries(fp).find(([id, v]) => v > 50);

  if (firstRoundWinner) {
    const [winnerId, winnerVal] = firstRoundWinner;
    PARTIES.forEach(p => {
      const r2Td = document.querySelector(`[data-party-result="${p.id}"]`);
      const pctTd = document.querySelector(`[data-party-pct="${p.id}"]`);
      if (p.id === winnerId) {
        if (r2Td) r2Td.textContent = winnerVal.toFixed(1) + '%';
        if (pctTd) {
          pctTd.textContent = '100.0%';
          pctTd.className = 'result-column winner';
        }
      } else {
        if (r2Td) r2Td.textContent = '—';
        if (pctTd) {
          pctTd.textContent = '—';
          pctTd.className = 'result-column';
        }
      }
      if (p.auto) {
        const inp = document.querySelector(`input[data-party-id="${p.id}"]`);
        if (inp) inp.value = (fp[p.id] || 0).toFixed(1);
      }
    });
  } else {
    const { c1, c2, v1, v2 } = computeRound2();
    const tot = v1 + v2;
    PARTIES.forEach(p => {
      const isTop = p.id === c1 || p.id === c2;
      const r2val = p.id === c1 ? v1 : p.id === c2 ? v2 : null;
      const pct = r2val !== null ? (r2val / tot * 100) : null;
      const winner = r2val !== null && r2val === Math.max(v1, v2);
      const r2Td = document.querySelector(`[data-party-result="${p.id}"]`);
      const pctTd = document.querySelector(`[data-party-pct="${p.id}"]`);
      if (r2Td) r2Td.textContent = isTop ? r2val.toFixed(1) + '%' : '—';
      if (pctTd) {
        pctTd.textContent = isTop ? pct.toFixed(1) + '%' : '—';
        pctTd.className = 'result-column' + (winner ? ' winner' : '');
      }
      if (p.auto) {
        const inp = document.querySelector(`input[data-party-id="${p.id}"]`);
        if (inp) inp.value = (fp[p.id] || 0).toFixed(1);
      }
    });
  }

  const totEl = document.getElementById('fp-total');
  totEl.textContent = totalVal.toFixed(1) + '%';
  totEl.className = Math.abs(totalVal - 100) < 0.15 ? 'total-ok' : 'total-err';
}

  function attachInputBehaviour() {
  const inputs = [...document.querySelectorAll('#results-body input[type=number]:not([readonly])')];

  inputs.forEach((inp, index) => {
    let originalValue = inp.value;

    inp.addEventListener('focus', () => {
      originalValue = inp.value;
      inp.value = '';
    });

    inp.addEventListener('input', () => {
      updateSliderDisplay();
    });

    inp.addEventListener('blur', () => {
      if (inp.value === '' || isNaN(parseFloat(inp.value))) {
        inp.value = originalValue;
      } else {
        let v = Math.max(0, Math.min(100, parseFloat(inp.value)));
        fpVotes[inp.dataset.partyId] = v;
        inp.value = v.toFixed(1);
      }
      renderResults();
      updateSliderDisplay();
    });

    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (inp.value === '' || isNaN(parseFloat(inp.value))) {
          inp.value = originalValue;
        } else {
          let v = Math.max(0, Math.min(100, parseFloat(inp.value)));
          fpVotes[inp.dataset.partyId] = v;
          inp.value = v.toFixed(1);
        }
        renderResults();
        updateSliderDisplay();
        if (inputs[index + 1]) {
          inputs[index + 1].focus();
          inputs[index + 1].select();
        } else {
          inputs[0].focus();
          inputs[0].select();
        }
      }
    });
  });
}

function renderSliders() {

  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = '';
  PARTIES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (p.id === activeTab ? ' active' : '');
    if (p.id === activeTab) btn.style.background = p.color;
    const dotColor = p.id === activeTab ? 'rgba(255,255,255,0.65)' : p.color;
    btn.innerHTML = `<span class="tab-dot" style="background:${dotColor}"></span>${p.id}`;
    btn.addEventListener('click', () => { activeTab = p.id; renderSliders(); });
    tabBar.appendChild(btn);
  });

  const area = document.getElementById('slider-area');
  area.innerHTML = '';

const toList = [
  ...PARTIES,
  { id: 'NON', name: 'No 2nd vote', color: '#999999' }
];

toList.forEach(to => {
  const isNon = to.id === 'NON';
  const isSelf = to.id === activeTab;
const v = isNon
  ? (transfers[activeTab]['NON'] || 0)
  : isSelf
    ? 0
    : (transfers[activeTab][to.id] || 0);

    const row = document.createElement('div');
    row.className = 'slider-row';
    row.dataset.toId = to.id;

    const lbl = document.createElement('div');
    lbl.className = 'sl-lbl';
    lbl.innerHTML = `<span class="sl-dot" style="background:${to.color}"></span>${isNon ? 'No 2nd vote' : to.name}`;

  if (isSelf) {
  lbl.style.opacity = '0.45';
}

    const sl = document.createElement('input');
    sl.type = 'range'; sl.min = 0; sl.max = 100; sl.step = 0.1;
    sl.value = v;

 sl.dataset.dragging = 'false';

sl.addEventListener('pointerdown', e => {

  const rect = sl.getBoundingClientRect();

  const thumbSize = 14;
  const pct = (sl.value - sl.min) / (sl.max - sl.min);
  const thumbX = thumbSize / 2 + pct * (rect.width - thumbSize);

  const clickX = e.clientX - rect.left;

  if (Math.abs(clickX - thumbX) <= 12) {
    sl.dataset.dragging = 'true';
  } else {
    sl.dataset.dragging = 'false';
    e.preventDefault();
  }

});

sl.addEventListener('change', () => {
  sl.dataset.dragging = 'false';
});
  
    sl.style.setProperty('--sl-color', to.color);

  const pct = v;
sl.style.setProperty(
  '--track-bg',
  `linear-gradient(to right,
    ${to.color} 0%,
    ${to.color} ${pct}%,
    #d1d5db ${pct}%,
    #d1d5db 100%)`
);

if (isNon || isSelf) {
  sl.disabled = true;
  sl.value = 0;
} else {
      sl.addEventListener('input', () => {
        
        if (sl.dataset.dragging !== 'true') {
  sl.value = transfers[activeTab][to.id] || 0;
  return;
}
        const desired = parseFloat(sl.value);

        const othersTotal = PARTIES.filter(p => p.id !== activeTab && p.id !== to.id)
          .reduce((a, p) => a + (transfers[activeTab][p.id] || 0), 0);

        const maxAllowed = Math.max(0, 100 - othersTotal);
        const clamped = Math.round(Math.min(desired, maxAllowed) * 10) / 10;

        sl.value = clamped;
        transfers[activeTab][to.id] = clamped;

        sl.style.setProperty(
  '--track-bg',
  `linear-gradient(to right,
    ${to.color} 0%,
    ${to.color} ${clamped}%,
    #d1d5db ${clamped}%,
    #d1d5db 100%)`
);

        recalcNon(activeTab);

        updateSliderDisplay();
        renderResults();
      });
    }

    const valSpan = document.createElement('span');
    valSpan.className = 'sl-val' + (isNon ? ' auto' : '');
    valSpan.dataset.key = to.id;
    valSpan.textContent = Math.round(v) + '%';

  if (isSelf) {
  valSpan.style.opacity = '0.45';
}

    row.appendChild(lbl);
    row.appendChild(sl);
    row.appendChild(valSpan);
    area.appendChild(row);
  });

  updateSliderDisplay();
}

function updateSliderDisplay() {
  const rows = document.querySelectorAll('#slider-area .slider-row');
  let total = 0;
  rows.forEach(row => {
    const toId = row.dataset.toId;
    const v = toId === 'NON'
      ? (transfers[activeTab]['NON'] || 0)
      : (transfers[activeTab][toId] || 0);
    total += v;
    const sl = row.querySelector('input[type=range]');
    const valEl = row.querySelector('.sl-val');

if (sl) {
  if (toId === 'NON') sl.value = v;

  const colour = row.querySelector('.sl-dot').style.background;

  sl.style.setProperty(
    '--track-bg',
    `linear-gradient(to right,
      ${colour} 0%,
      ${colour} ${v}%,
      #d1d5db ${v}%,
      #d1d5db 100%)`
  );
}

if (valEl) valEl.textContent = Math.round(v) + '%';
    
  });

}

function updateAll() {
  renderResults();
  updateSliderDisplay();
}

function resetAll() {
  fpVotes = { ...DEFAULT_FP };
  transfers = makeDefaultTransfers();
  const inputs = document.querySelectorAll('#results-body input[type=number]:not([readonly])');
  inputs.forEach(inp => {
    inp.value = (fpVotes[inp.dataset.partyId] || 0).toFixed(1);
  });
  renderSliders();
  updateAll();
}

buildResultsTable();
renderSliders();
updateAll();
</script>

</div>
</div>
